name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      # Smoke test: spawn the binary with a dummy key and verify the MCP
      # handshake returns the expected number of tools.
      - name: Smoke test
        run: |
          output=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | FLOOP_API_KEY=flp_dummy timeout 5 node dist/index.js 2>/dev/null)
          count=$(echo "$output" | python -c "import json,sys
for line in sys.stdin:
    if not line.strip(): continue
    m = json.loads(line)
    if m.get('id') == 2:
        print(len(m['result']['tools']))
        break")
          echo "Registered tools: $count"
          if [ "$count" != "12" ]; then
            echo "Expected 12 tools, got $count" >&2
            exit 1
          fi
