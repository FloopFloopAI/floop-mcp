name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-build:
    name: Typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Smoke test: spawn the binary with a dummy key and verify the MCP
      # handshake returns the expected number of tools.
      - name: Smoke test (stdio handshake)
        run: |
          output=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | FLOOP_API_KEY=flp_dummy timeout 5 node dist/index.js 2>/dev/null)
          count=$(printf '%s\n' "$output" | python3 -c 'import json,sys; [print(len(m["result"]["tools"])) for m in (json.loads(l) for l in sys.stdin if l.strip()) if m.get("id")==2]' | head -1)
          echo "Registered tools: $count"
          if [ "$count" != "18" ]; then
            echo "Expected 18 tools, got $count" >&2
            exit 1
          fi
